<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Confirm Action - Cloud Storage</title>
    <style>

        table {
            border-collapse: collapse;
        }

        th, td {
            padding: 5px;
        }

        table, th, td {
            text-align: start;
            border: 1px solid black;
        }
    </style>
</head>
<body>
<h3>Warning: Confirm action</h3>

<div th:if="${errors}">
    <ul>
        <li th:each="error: ${errors}" th:text="${error}"></li>
    </ul>
</div>

<p style="margin-bottom: 10px">Are you sure you want to delete these objects? <b>This action cannot be undone.</b></p>
<form style="margin-bottom: 10px" th:action="@{/storage/delete}" method="post">
    <input type="hidden" name="prefix" th:value="${prefix}">
    <input type="hidden" name="name" th:value="${name}">
    <button style="margin-right: 10px" type="submit">Yes, delete all object</button>
    <a th:href="@{/storage(prefix=${prefix})}">No, Cancel</a>
</form>
</body>
</html>
