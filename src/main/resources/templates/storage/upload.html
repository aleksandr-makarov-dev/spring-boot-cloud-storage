<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Upload - Cloud Storage</title>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-lg">
        <a class="navbar-brand" href="/">
            Cloud Storage
        </a>
        <div class="ms-auto">
            <a href="/users/login" class="btn btn-outline-light me-2" type="button">Login</a>
            <a href="/users/register" class="btn btn-primary" type="button">Register</a>
        </div>
    </div>
</nav>

<main class="container-lg py-4">
    <div style="max-width: 768px">
        <div class="mb-3">
            <h2>File Upload</h2>
            <p>Add your documents here, and you can upload up to 5 files max</p>
        </div>
        <div th:if="${errors}" class="alert alert-danger">
            <ul class="mb-0">
                <li th:each="error: ${errors}" th:text="${error}"></li>
            </ul>
        </div>
        <form class="mb-5" th:action="@{/storage/upload(prefix=${param.prefix})}" method="post"
              enctype="multipart/form-data">
            <input class="form-control mb-3" type="file" name="files" multiple>
            <button class="btn btn-primary" type="submit">Upload files</button>
        </form>
        <div class="mb-3">
            <h2>Folder Upload</h2>
            <p>Add your documents here, and you can upload up to 5 files max</p>
        </div>
        <form th:action="@{/storage/upload(prefix=${param.prefix})}" method="post" enctype="multipart/form-data">
            <input class="form-control mb-3" type="file" name="files" webkitdirectory directory multiple>
            <button class="btn btn-primary" type="submit">Upload folder</button>
        </form>
    </div>
</main>


</body>
</html>
