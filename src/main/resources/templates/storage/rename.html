<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Rename - Cloud Storage</title>
  <style>

    :root {
      font-family: Arial, Helvetica, sans-serif;
    }

    label{
      margin-bottom: 5px;
      display: block;
    }

    .form-group{
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
<h3>Rename</h3>

<div th:if="${errors}">
  <ul>
    <li th:each="error: ${errors}" th:text="${error}"></li>
  </ul>
</div>

<form th:action="@{/storage/rename}" method="post">
  <div class="form-group">
    <label for="prefix">Prefix</label>
    <input id="prefix" name="prefix" readonly th:value="${prefix}">
  </div>
  <div class="form-group">
    <label for="originalName">Original name</label>
    <input id="originalName" name="originalName" readonly  th:value="${name}">
  </div>
  <div class="form-group">
    <label for="newName">New name</label>
    <input id="newName" name="newName" placeholder="Enter object's new name" autofocus>
  </div>
  <button type="submit">Rename</button>
</form>
</body>
</html>
