<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Rename - Cloud Storage</title>
  <link rel="stylesheet" href="/public/css/bootstrap.min.css">
</head>
<body class="container-sm bg-light">
<!-- Header -->
<header class="navbar navbar-expand-sm navbar-dark bg-dark d-flex justify-content-between align-items-center px-3 mb-3">
  <a class="navbar-brand text-white" href="/storage">Cloud Storage</a>
  <div th:if="${user == null}">
    <a class="btn btn-secondary me-2" href="/users/login">Login</a>
    <a class="btn btn-primary" href="/users/register">Register</a>
  </div>
  <div class="d-flex align-items-center" th:if="${user}">
    <span class="text-white me-3" th:text="${user.getUsername()}"></span>
    <a href="/users/logout" class="btn btn-primary">Logout</a>
  </div>
</header>

<!-- Main Content -->
<main class="py-4 px-3">
  <h2 class="mb-4">Rename</h2>

  <!-- Display Errors -->
  <div th:if="${errors}" class="alert alert-danger">
    <ul class="mb-0">
      <li th:each="error: ${errors}" th:text="${error}"></li>
    </ul>
  </div>

  <!-- Rename Form -->
  <form th:action="@{/storage/rename}" method="post" style="max-width: 567px;">
    <div class="mb-3">
      <label for="prefix" class="form-label">Prefix</label>
      <input id="prefix" name="prefix" type="text" class="form-control" readonly th:value="${prefix}">
    </div>

    <div class="mb-3">
      <label for="originalName" class="form-label">Original Name</label>
      <input id="originalName" name="originalName" type="text" class="form-control" readonly th:value="${name}">
    </div>

    <div class="mb-3">
      <label for="newName" class="form-label">New Name</label>
      <input id="newName" name="newName" type="text" class="form-control" placeholder="Enter object's new name" autofocus required>
    </div>

    <button type="submit" class="btn btn-primary">Rename</button>
  </form>
</main>
</body>
</html>
