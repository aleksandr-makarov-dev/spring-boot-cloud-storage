<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <title>Create - Cloud Storage</title>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-lg">
    <a class="navbar-brand" href="/">
      Cloud Storage
    </a>
    <div class="ms-auto">
      <a href="/users/login" class="btn btn-outline-light me-2" type="button">Login</a>
      <a href="/users/register" class="btn btn-primary" type="button">Register</a>
    </div>
  </div>
</nav>

<main class="container-lg py-4">
  <div style="max-width: 768px">
    <div class="mb-3">
      <h2>Create folder</h2>
    </div>
    <div th:if="${errors}" class="alert alert-danger">
      <ul class="mb-0">
        <li th:each="error: ${errors}" th:text="${error}"></li>
      </ul>
    </div>
    <form class="mb-5" th:action="@{/storage/create(prefix=${param.prefix})}" method="post">
      <input class="form-control mb-3" type="text" name="name">
      <button class="btn btn-primary" type="submit">Create folder</button>
    </form>
  </div>
</main>


</body>
</html>
