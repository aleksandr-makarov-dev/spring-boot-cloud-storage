<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>List - Cloud Storage</title>
    <style>

        :root {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            border-collapse: collapse;
        }

        th, td {
            padding: 5px;
        }

        table, th, td {
            text-align: start;
            border: 1px solid black;
        }

        .breadcrumbs {
            list-style: none;
        }

        ul {
            padding-inline: 0;
        }

        .breadcrumbs li {
            display: inline;
        }

        .breadcrumbs li + li:before {
            padding: 3px;
            content: "/";
        }

        .navigation {
            margin-bottom: 10px;
            gap: 24px;
            display: flex;
        }
    </style>
</head>
<body style="max-width: 992px;">
<section>
    <header>
        <div>
            <ul class="breadcrumbs">
                <li th:each="crumb: ${breadcrumbs}">
                    <a th:href="@{/storage(prefix=${crumb.href()})}" th:text="${crumb.name()}"></a>
                </li>
            </ul>
        </div>
        <div class="navigation">
            <div style="flex: 1">
                <form style="display: flex; width: 100%" method="get" th:action="@{/storage/search}">
                    <input style="width: 100%" name="query" id="query" type="search">
                    <button>Search</button>
                </form>
            </div>
            <div style="display: flex; gap: 10px">
                <a th:href="@{/storage/create(prefix=${param.prefix})}">Create folder</a>
                <a th:href="@{/storage/upload(prefix=${param.prefix})}">Upload</a>
            </div>
        </div>
    </header>
    <table style="width: 100%">
        <thead>
        <tr>
            <th>File Name</th>
            <th>Type</th>
            <th>Last Modified</th>
            <th>File Size</th>
            <th style="width: 200px">Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${items.size() == 0}">
            <td colspan="5">This folder is empty. Try uploading a new file.</td>
        </tr>
        <tr th:each="item: ${items}">
            <td th:if="${item.isDir()}">
                <a th:href="@{/storage(prefix=${item.prefix() + item.name()})}" th:text="${item.name()}"></a>
            </td>
            <td th:if="${!item.isDir()}" th:text="${item.name()}"></td>
            <td th:if="${!item.isDir()}">FILE</td>
            <td th:if="${item.isDir()}">DIR</td>
            <td th:text="${item.lastModified()}"></td>
            <td th:text="${item.size()}"></td>
            <td>
                <a th:if="${!item.isDir()}"
                   th:href="@{/storage/download(object=${item.prefix()+item.name()})}">Download</a>
                <a th:href="@{/storage/rename(prefix=${item.prefix()}, name=${item.name()})}">Rename</a>
                <a th:href="@{/storage/delete(prefix=${item.prefix()}, name=${item.name()})}">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</section>
</body>
</html>
